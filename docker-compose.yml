services:
  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - worker

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: /api
    expose:
      - "5173"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: file:/data/read-local.db
      PORT: "3000"
      WORKER_BASE_URL: http://worker:3001
    volumes:
      - sqlite-data:/data
    expose:
      - "3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: file:/data/read-local.db
      PORT: "3001"
    volumes:
      - sqlite-data:/data
    expose:
      - "3001"

volumes:
  sqlite-data:
